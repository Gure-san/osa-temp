<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>On-site Attendance</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
}

th{
    background:#eee;
}

.controls{
    margin:15px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

button{
    padding:8px 14px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:260px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>On-site Attendance</h1>

<div class="controls">
<button onclick="checkAll()">Check Semua</button>
<button onclick="uncheckAll()">Uncheck Semua</button>
<button onclick="generateAttendance()">Generate Presensi</button>
<button onclick="copyResult()">Copy Text</button>
</div>

<table id="studentTable">
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>NIM</th>
<th>Hadir</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Hasil Presensi</h3>
<textarea id="result"></textarea>

<script>

function renderTable(){

const tbody=document.querySelector("#studentTable tbody");

mahasiswa.forEach((m,i)=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${i+1}</td>
<td>${m.nama}</td>
<td>${m.nim ?? "-"}</td>
<td><input type="checkbox" class="check"></td>
`;

tbody.appendChild(tr);

});

}

function checkAll(){
document.querySelectorAll(".check").forEach(c=>c.checked=true);
}

function uncheckAll(){
document.querySelectorAll(".check").forEach(c=>c.checked=false);
}

function generateAttendance(){

const checks=document.querySelectorAll(".check");

let hadir=[];
let tidakHadir=[];

checks.forEach((c,i)=>{

const m=mahasiswa[i];

if(c.checked){

if(m.nim){
hadir.push(`${m.nama} -- ${m.nim}`);
}else{
hadir.push(`${m.nama}`);
}

}else{

if(m.nim){
tidakHadir.push(`${m.nama} -- ${m.nim}`);
}else{
tidakHadir.push(`${m.nama}`);
}

}

});

let output="";

output+="# Daftar mahasiswa yang hadir\n";

hadir.forEach((n,i)=>{
output+=`${i+1}. ${n}\n`;
});

output+="\n# Daftar mahasiswa yang tidak hadir\n";

tidakHadir.forEach((n,i)=>{
output+=`${i+1}. ${n}\n`;
});

document.getElementById("result").value=output;

}

function copyResult(){

const textarea=document.getElementById("result");

textarea.select();
document.execCommand("copy");

alert("Text berhasil disalin");

}

renderTable();

</script>

</body>
</html>
